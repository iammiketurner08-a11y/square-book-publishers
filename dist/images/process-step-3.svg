<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="600" rx="36" fill="#f8fafc"/>
  
  <g transform="translate(250, 150)">
    <!-- Globe behind Rocket -->
    <circle cx="150" cy="180" r="100" fill="none" stroke="#0f172a" stroke-width="2" stroke-opacity="0.1"/>
    <ellipse cx="150" cy="180" rx="40" ry="100" fill="none" stroke="#0f172a" stroke-width="2" stroke-opacity="0.1"/>
    <line x1="50" y1="180" x2="250" y2="180" stroke="#0f172a" stroke-width="2" stroke-opacity="0.1"/>

    <!-- Rocket / Launch -->
    <g transform="translate(110, 30) rotate(15)">
      <!-- Rocket Fire/Thrust -->
      <path d="M25 100 L40 140 L15 130 Z" fill="#f27d26"/>
      <path d="M15 100 L25 120 L5 115 Z" fill="#eb4813" opacity="0.9"/>

      <!-- Rocket Body -->
      <path d="M20 10 L40 50 L40 100 L0 100 L0 50 Z" fill="#0f172a"/>
      <!-- Nose Cone -->
      <path d="M20 10 L40 50 L0 50 Z" fill="#f27d26"/>
      <!-- Fins -->
      <path d="M0 80 L-15 100 L0 100 Z" fill="#64748b"/>
      <path d="M40 80 L55 100 L40 100 Z" fill="#64748b"/>
      <!-- Window -->
      <circle cx="20" cy="65" r="8" fill="white"/>
    </g>

    <!-- Success sparks -->
    <circle cx="40" cy="80" r="5" fill="#f27d26"/>
    <circle cx="250" cy="90" r="8" fill="#f27d26" opacity="0.5"/>
    <circle cx="220" cy="240" r="4" fill="#0f172a" opacity="0.3"/>
  </g>
</svg>

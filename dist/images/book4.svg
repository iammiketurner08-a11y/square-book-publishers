<svg width="600" height="800" viewBox="0 0 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="800" fill="#2e1065"/>
  
  <!-- Magic Portal or Gate -->
  <g transform="translate(300, 380)">
    <circle cx="0" cy="0" r="140" stroke="#f27d26" stroke-width="4" stroke-dasharray="8 8"/>
    <circle cx="0" cy="0" r="120" stroke="white" stroke-width="1" stroke-opacity="0.3"/>
    <path d="M-80,0 C-40,-80 40,-80 80,0 C40,80 -40,80 -80,0 Z" fill="#f27d26" opacity="0.15"/>
    <polygon points="0,-40 10,0 40,10 10,20 0,60 -10,20 -40,10 -10,0" fill="white"/>
  </g>

  <text x="300" y="140" fill="white" font-family="system-ui" font-size="36" font-weight="900" text-anchor="middle" letter-spacing="4">BEYOND THE</text>

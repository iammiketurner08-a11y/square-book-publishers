<svg width="600" height="800" viewBox="0 0 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="800" fill="#78350f"/>
  <rect width="600" height="800" fill="#000000" opacity="0.3"/>
  
  <!-- Hourglass or circular rings for time echoes -->
  <circle cx="300" cy="460" r="140" stroke="white" stroke-width="2" stroke-opacity="0.2"/>
  <circle cx="300" cy="460" r="100" stroke="white" stroke-width="2" stroke-opacity="0.1" stroke-dasharray="4 4"/>
  <circle cx="300" cy="460" r="60" stroke="#f27d26" stroke-width="3" stroke-opacity="0.7"/>

  <text x="300" y="160" fill="white" font-family="system-ui" font-size="36" font-weight="bold" text-anchor="middle" letter-spacing="4">ECHOES OF</text>
  <text x="300" y="220" fill="#f27d26" font-family="system-ui" font-size="44" font-weight="black" text-anchor="middle" letter-spacing="6">TIME</text>
  <text x="300" y="260" fill="white" opacity="0.5" font-family="system-ui" font-size="14" font-style="italic" text-anchor="middle">A MEMOIR OF LIFE, LOVE &amp; LEGACY</text>

  <rect x="220" y="720" width="160" height="1" fill="white" opacity="0.4"/>
  <text x="300" y="750" fill="white" opacity="0.8" font-family="system-ui" font-size="16" text-anchor="middle" letter-spacing="3">VICTORIA STERLING</text>
</svg>

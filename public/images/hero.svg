<svg width="1200" height="1600" viewBox="0 0 1200 1600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Subtle Gradient Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f27d26" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#f27d26" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="bookCap">
      <rect x="300" y="400" width="600" height="800" rx="32"/>
    </clipPath>
  </defs>

  <rect width="1200" height="1600" fill="url(#bgGrad)"/>
  
  <!-- Abstract Decorative Circles in Background -->
  <circle cx="950" cy="350" r="250" stroke="#f27d26" stroke-width="2" stroke-opacity="0.15" stroke-dasharray="10 15"/>
  <circle cx="200" cy="1200" r="300" stroke="white" stroke-width="1.5" stroke-opacity="0.05"/>

  <!-- Glowing Aura of the Main Book Cover -->
  <circle cx="600" cy="800" r="450" fill="url(#glowGrad)" filter="blur(80px)"/>

  <!-- Centered Book Cover Mockup Frame -->
  <g filter="drop-shadow(0px 25px 50px rgba(0, 0, 0, 0.5))">
    <rect x="300" y="400" width="600" height="800" rx="24" fill="#0f172a" stroke="#ffffff" stroke-width="8" stroke-opacity="0.1"/>
    
    <!-- Spine Accent -->
    <rect x="300" y="400" width="30" height="800" rx="0" fill="#f27d26"/>
    
    <!-- Inside Book Illustration Art -->
    <rect x="350" y="450" width="500" height="700" rx="12" fill="#1e293b"/>
    
    <!-- Stylized Mountains (Design representing Silent Horizon / Ascent) -->
    <path d="M350 900L500 700L650 850L750 780L850 950H350V900Z" fill="#334155"/>
    <path d="M420 950H780L620 750L420 950Z" fill="#f27d26" opacity="0.85"/>

    <!-- Sun/Moon representing Vision -->
    <circle cx="600" cy="620" r="60" fill="white"/>

    <!-- Cover Typography lines -->
    <rect x="420" y="500" width="360" height="12" rx="6" fill="white"/>
    <rect x="480" y="530" width="240" height="8" rx="4" fill="#f27d26"/>
    
    <!-- Author tag line -->
    <rect x="520" y="1080" width="160" height="6" rx="3" fill="white" opacity="0.4"/>
  </g>

  <!-- Clean minimalist grid lines overlay -->
  <line x1="100" y1="0" x2="100" y2="1600" stroke="white" stroke-opacity="0.03" stroke-width="2"/>
  <line x1="1100" y1="0" x2="1100" y2="1600" stroke="white" stroke-opacity="0.03" stroke-width="2"/>
  <line x1="0" y1="200" x2="1200" y2="200" stroke="white" stroke-opacity="0.03" stroke-width="2"/>
  <line x1="0" y1="1400" x2="1200" y2="1400" stroke="white" stroke-opacity="0.03" stroke-width="2"/>
</svg>
